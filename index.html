<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Discord Account Support Corporation</title>

<link rel="manifest" href="manifest.webmanifest">

<meta name="theme-color" content="#007AFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="DASC">

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f2f2f7;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

button{
    background:#007AFF;
    color:#fff;
    border:none;
    border-radius:16px;
    padding:18px 40px;
    font-size:20px;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 6px 15px rgba(0,0,0,.15);
}

button:active{
    transform:scale(.97);
}
</style>
</head>

<body>

<button id="launchButton">
🚀 Open Discord Account Support Corporation
</button>

<script>
document.getElementById("launchButton").addEventListener("click", function () {
    window.location.assign("https://www.concorder.net/en/group/23/discord-account-support-corporation");
});

if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js");
}
</script>

</body>
</html>
