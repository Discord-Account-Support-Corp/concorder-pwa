<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Discord Account Support Corporation</title>

<link rel="manifest" href="manifest.webmanifest">

<meta name="theme-color" content="#007AFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DASC">

<link rel="apple-touch-icon" href="icons/icon-192.png">

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
}

body {
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f2f2f7;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

    padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);

    overflow: hidden;
}

.container {
    width: 100%;
    max-width: 420px;
    padding: 24px;
    text-align: center;
}

button {
    width: 100%;
    padding: 18px;
    font-size: 20px;
    font-weight: 600;
    color: white;
    background: #007AFF;
    border: none;
    border-radius: 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Discord Account Support Corporation</h1>

<p>Launch your Concorder group.</p>

<button id="launchButton">
🚀 Open Group
</button>

</div>

<script>
const GROUP_URL =
"https://www.concorder.net/en/group/23/discord-account-support-corporation";

const isStandalone =
    window.matchMedia("(display-mode: standalone)").matches ||
    window.navigator.standalone === true;

const button = document.getElementById("launchButton");

// Auto-launch only after first successful launch
if (isStandalone && localStorage.getItem("launcherInstalled") === "true") {
    setTimeout(() => {
        window.location.replace(GROUP_URL);
    }, 250);
}

button.onclick = () => {
    localStorage.setItem("launcherInstalled", "true");
    window.location.replace(GROUP_URL);
};

if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js");
}
</script>

</body>
</html>
