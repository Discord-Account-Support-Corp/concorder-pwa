<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Discord Account Support Corporation</title>

<link rel="manifest" href="manifest.webmanifest">

<meta name="theme-color" content="#007AFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="DASC">

<link rel="apple-touch-icon" href="icons/icon-192.png">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f2f2f7;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.container{
    text-align:center;
    padding:20px;
}

h1{
    margin-bottom:10px;
}

p{
    color:#666;
    margin-bottom:25px;
}

button{
    background:#007AFF;
    color:#fff;
    border:none;
    border-radius:16px;
    padding:18px 36px;
    font-size:20px;
    font-weight:600;
    cursor:pointer;
}

button:active{
    transform:scale(.97);
}
</style>

</head>
<body>

<div class="container">

<h1>Discord Account Support Corporation</h1>

<p>Launch your Concorder group.</p>

<button id="launchButton">
🚀 Open Group
</button>

</div>

<script>
const GROUP_URL = "https://www.concorder.net/en/group/23/discord-account-support-corporation";

const isStandalone =
    window.matchMedia("(display-mode: standalone)").matches ||
    window.navigator.standalone === true;

// Hide the button while deciding what to do.
const button = document.getElementById("launchButton");

if (isStandalone && localStorage.getItem("launcherInstalled") === "true") {
    // Give the PWA a moment to load, then launch the group.
    setTimeout(() => {
        window.location.assign(GROUP_URL);
    }, 500);
}

button.addEventListener("click", () => {
    localStorage.setItem("launcherInstalled", "true");
    window.location.assign(GROUP_URL);
});

if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js");
}
</script>

</body>
</html>
